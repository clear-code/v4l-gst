name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Install apt packages
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential autoconf automake libtool \
          intltool gtk-doc-tools pkg-config python3 python3-pip ninja-build \
          libgstreamer1.0-dev  libgstreamer-plugins-base1.0-dev

    - name: Install Python tools
      run: |
        pip3 install --upgrade meson ninja

    - name: Run bootstrap and tests
      run: |
        chmod +x ./scripts/bootstrap-tests.sh
        ./scripts/bootstrap-tests.sh
